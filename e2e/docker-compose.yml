# Reproducible e2e game-server harness for the twclient (SPEC T132 / V114).
#
# Brings up TWO bot-populated game servers so the client can be exercised
# against real snapshots containing multiple characters (+ CTF entities):
#
#   ddnet       VANILLA DDNet sixup server: serves BOTH 0.6 and 0.7 on one UDP
#               port (DDRace gametype — multi-character via dbg_dummies, no CTF
#               flags; the teeworlds7 service supplies CTF flag/pickup coverage).
#   teeworlds7  vanilla teeworlds 0.7.5 dedicated server on a real CTF map.
#
# Both run `dbg_dummies 4` so their snapshots carry several characters.
#
# Host port map:
#   ddnet       udp/8303  (0.6 + 0.7)
#   teeworlds7  udp/8307  (0.7)
#
# Then point the test at them (see e2e/README.md):
#   TW_E2E=1 \
#   TW_E2E_DDNET_06=127.0.0.1:8303 \
#   TW_E2E_DDNET_07=127.0.0.1:8303 \
#   TW_E2E_VANILLA_07=127.0.0.1:8307 \
#   go test -tags e2e -run TestE2E ./e2e/ -v
#
# NOTE: both upstream artifacts are amd64-only, so `platform` is pinned to
# linux/amd64 (runs under emulation on Apple Silicon).
name: tw-e2e

services:
  ddnet:
    build:
      context: .
      dockerfile: ddnet.Dockerfile
    image: tw-e2e-ddnet:local
    platform: linux/amd64
    ports:
      - "8303:8303/udp"
    restart: unless-stopped

  teeworlds7:
    build:
      context: .
      dockerfile: teeworlds7.Dockerfile
    image: tw-e2e-teeworlds7:local
    platform: linux/amd64
    ports:
      - "8307:8303/udp"
    restart: unless-stopped

  # Small-map DDNet sixup instance for the loss test (T164). The default server's
  # "Sunny Side Up" is ~1.3 MB, whose 0.7 serial-windowed vital download takes ~50s
  # under 20% bidirectional loss; a tiny stock map (dm1, ~6 KB) exercises the SAME
  # loss path (handshake-ACCEPT recovery, MAP_DATA gap retransmit, CON_READY) in
  # seconds, so the test keeps the full 20%/20% rate AND stays fast. sixup → serves
  # both 0.6 and 0.7. Reached in-network as ddnet-small:8303.
  ddnet-small:
    image: tw-e2e-ddnet:local
    platform: linux/amd64
    depends_on: [ddnet]
    command:
      - "./DDNet-Server"
      - "sv_name 'tw-e2e ddnet small'"
      - "sv_port 8303"
      - "sv_register 0"
      - "sv_sixup 1"
      # Loss test resends CONNECT repeatedly → each counts toward the connlimit;
      # raise it so a lossy login is not refused as a connect flood (V120).
      - "sv_connlimit 100"
      - "sv_connlimit_time 1"
      - "sv_van_conn_per_second 0"
      - "sv_map dm1"
      - "dbg_dummies 4"
    restart: unless-stopped

  # Passworded instances (same images, command override) for the wrong-password
  # reject test (T154). Reached IN-NETWORK by service name (ddnet-pw:8303 /
  # teeworlds7-pw:8303) — no host port mapping needed.
  ddnet-pw:
    image: tw-e2e-ddnet:local
    platform: linux/amd64
    depends_on: [ddnet]
    command:
      - "./DDNet-Server"
      - "sv_name 'tw-e2e ddnet pw'"
      - "sv_port 8303"
      - "sv_register 0"
      - "sv_sixup 1"
      - "sv_connlimit 100"
      - "sv_connlimit_time 1"
      - "sv_van_conn_per_second 0"
      - "sv_map \"Sunny Side Up\""
      - "password twsecret"
    restart: unless-stopped

  teeworlds7-pw:
    image: tw-e2e-teeworlds7:local
    platform: linux/amd64
    depends_on: [teeworlds7]
    command: ["./teeworlds_srv", "exec teeworlds7.cfg", "password twsecret"]
    restart: unless-stopped

  # A SECOND vanilla instance for the connect-heavy live tests (reconnect, kick):
  # vanilla teeworlds 0.7 rate-bans an IP after ~6 rapid connects, so spreading
  # the suite's vanilla connects across two servers keeps each under the threshold
  # (B17/V120). Same image + cfg (econ on 9303 internal).
  teeworlds7-b:
    image: tw-e2e-teeworlds7:local
    platform: linux/amd64
    depends_on: [teeworlds7]
    command: ["./teeworlds_srv", "exec teeworlds7.cfg"]
    restart: unless-stopped

  # FLOOD-ON instances for the flood-safe reconnect regression tests (T187/V142)
  # — flood protection INTACT, unlike the patched/raised fast suite (V140). They
  # prove the flood-safe reconnect policy (V141) does NOT trip a real server's
  # connect-flood ban. Reached in-network as teeworlds7-flood:8303 /
  # ddnet-flood:8303 (econ on 9303). Built/run only for the opt-in flood suite.
  teeworlds7-flood:
    build:
      context: .
      dockerfile: teeworlds7.Dockerfile
      args:
        TW_FLOOD_PATCH: "0" # keep the "Stressing network" 60s ban (TW-1)
    image: tw-e2e-teeworlds7-flood:local
    platform: linux/amd64
    restart: unless-stopped

  ddnet-flood:
    image: tw-e2e-ddnet:local
    platform: linux/amd64
    depends_on: [ddnet]
    command:
      - "./DDNet-Server"
      - "sv_name 'tw-e2e ddnet flood'"
      - "sv_port 8303"
      - "sv_register 0"
      - "sv_sixup 1"
      # DEFAULT connect-flood limits (sv_connlimit 5 / sv_connlimit_time 20s) —
      # NOT raised — so the DD-1 "Too many connections" path is live (T187).
      - "sv_map dm1"
      - "sv_rcon_password twrcon"
      - "ec_bindaddr 0.0.0.0"
      - "ec_port 9303"
      - "ec_password tweecon"
      - "dbg_dummies 4"
    restart: unless-stopped
