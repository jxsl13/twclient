# Vanilla teeworlds 0.7.5 dedicated server config for the e2e harness.
# Loaded via `teeworlds_srv "exec teeworlds7.cfg"` (see teeworlds7.Dockerfile).
# teeworlds console comments use '#' (NOT '//', which it parses as a command).

sv_name "tw-e2e vanilla 0.7 ctf"
sv_port 8303
sv_register 0

# sv_max_clients must stay safely above the dummy count: spawning more dummies
# than the client cap segfaults the server (teeworlds#1735). 16 >> 4 is safe.
sv_max_clients 16
# Allow many rapid reconnects from the test's single IP without exhausting the
# per-IP slot limit (the e2e suite connects repeatedly) — e2e only, B17/V120.
sv_max_clients_per_ip 16

# CTF on the stock ctf1 map -> snapshot carries both flags + pickups on top of
# the bot characters.
sv_gametype ctf
sv_map ctf1
sv_scorelimit 0
sv_timelimit 0

# rcon (client-rcon feature test, T152) + external console (econ): the e2e tests
# drive kick/ban/shutdown out-of-band via econ. Static creds — e2e only.
sv_rcon_password twrcon
# ec_bindaddr 0.0.0.0 exposes econ in-network (default 'localhost' is unreachable
# from another container). e2e-only — never expose econ on a real deployment.
ec_bindaddr 0.0.0.0
ec_port 9303
ec_password tweecon

# Server-side bots: 4 dummy characters so every snapshot is multi-character.
dbg_dummies 4
