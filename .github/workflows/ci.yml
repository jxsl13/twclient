# CI pipeline (SPEC V117 / T145–T147).
#
# Three jobs, maximum parallelism:
#   test   non-live suite (gates + go test -race), starts immediately.
#   build  matrix (ddnet ∥ teeworlds7): builds each e2e server image FROM SOURCE
#          (V116) with a shared gha layer cache + smoke-verifies it starts and
#          accepts dbg_dummies (CONF_DEBUG build). Runs concurrently with `test`.
#   e2e    live parity tests, needs [test, build] → runs only after both pass.
#          Reuses the gha-cached layers (instant rebuild) and drives the client
#          IN-NETWORK against both containers (V114/V116, mirrors `make e2e`).
#
# The cmd/ harness is a separate, gitignored module → not part of CI.
name: CI

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']

permissions:
  contents: read

# Abort superseded runs: a new push/PR-update on the same ref cancels the
# in-flight run for that ref (keeps the queue lean, no wasted minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Run all JavaScript actions on Node 24 ahead of the 2026-06-16 runner default
# switch (GitHub-documented opt-in) — clears the Node 20 deprecation warnings on
# checkout/setup-go/upload-artifact/docker actions. Removable once Node 24 is the
# default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: non-live tests + gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Install lint/vuln tools
        run: make tools
      - name: Gates (vet, staticcheck, modernize-check, vuln, test + doccov)
        run: make check
      - name: Race detector + coverage
        run: |
          set -o pipefail
          # One pass: -race + statement coverage. tee keeps the per-package
          # "coverage: N%" lines for the summary (no extra test run).
          go test -race -covermode=atomic -coverprofile=coverage.out -timeout 10m ./... \
            | tee coverage.log
      - name: Coverage report
        if: always()
        run: |
          # Full per-function breakdown to the job log (also in the artifact).
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')"
          # Per-package statement % from the test run's own output (coverage.log).
          pkgcov="$(awk '/coverage:/ {for(i=1;i<=NF;i++) if($i=="coverage:" && $(i+1) ~ /%$/) print "| `" $2 "` | " $(i+1) " |"}' coverage.log | sort)"
          {
            echo "## Code coverage"
            echo ""
            echo "**Total: ${total}** — non-live suite, \`-race\` (reported, not gated; V130)"
            echo ""
            echo "| package | coverage |"
            echo "| --- | --- |"
            echo "$pkgcov"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Code coverage::total ${total}"
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

  build:
    name: build+start ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ddnet, teeworlds7]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image (source, cached)
        uses: docker/build-push-action@v6
        with:
          context: e2e
          file: e2e/${{ matrix.service }}.Dockerfile
          load: true
          tags: tw-e2e-${{ matrix.service }}:local
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Smoke-test (server starts + dbg_dummies accepted)
        run: |
          docker run -d --name smoke tw-e2e-${{ matrix.service }}:local
          sleep 15
          docker logs smoke || true
          # CONF_DEBUG build MUST accept dbg_dummies (B15.5 / V116).
          if docker logs smoke 2>&1 | grep -qi "No such command: dbg_dummies"; then
            echo "::error::dbg_dummies rejected — image is not a CONF_DEBUG build (V116)"
            exit 1
          fi
          # Container must still be running (did not crash, e.g. map load failure).
          if [ "$(docker inspect -f '{{.State.Running}}' smoke)" != "true" ]; then
            echo "::error::${{ matrix.service }} container is not running"
            exit 1
          fi
          docker rm -f smoke

  e2e:
    name: live parity tests
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Rebuild both images from the warmed gha cache (cache hit → fast) and load
      # them under the tags the compose file references, so `up` skips building.
      - name: Load ddnet image (cached)
        uses: docker/build-push-action@v6
        with:
          context: e2e
          file: e2e/ddnet.Dockerfile
          load: true
          tags: tw-e2e-ddnet:local
          cache-from: type=gha,scope=ddnet
      - name: Load teeworlds7 image (cached)
        uses: docker/build-push-action@v6
        with:
          context: e2e
          file: e2e/teeworlds7.Dockerfile
          load: true
          tags: tw-e2e-teeworlds7:local
          cache-from: type=gha,scope=teeworlds7
      - name: Start harness
        run: docker compose -f e2e/docker-compose.yml up -d
      - name: Run live suite + coverage (in-network)
        run: |
          # TestE2E is the strict parity GATE; TestLive adds the broader live
          # coverage (its secondary tests skip-guard harness-state connect
          # refusals, V120/V131, so they don't flake the gate). -coverpkg
          # attributes the live coverage to the library packages (default would
          # count only the e2e pkg). Profile + func summary are written on the
          # mounted volume by the container's go (the host has no go here).
          docker run --rm --network tw-e2e_default -v "$PWD":/src -w /src \
            -e TW_E2E=1 \
            -e TW_E2E_DDNET_06=ddnet:8303 \
            -e TW_E2E_DDNET_07=ddnet:8303 \
            -e TW_E2E_DDNET_SMALL=ddnet-small:8303 \
            -e TW_E2E_VANILLA_07=teeworlds7:8303 \
            golang:1.26 sh -c '
              go test -tags e2e -covermode=atomic \
                -coverpkg=github.com/jxsl13/twclient/... \
                -coverprofile=e2e.cov -timeout 10m -run "TestE2E|TestLive" ./e2e/ -v
              status=$?
              go tool cover -func=e2e.cov | tee e2e_cov_func.txt || true
              exit $status
            '
      - name: Live coverage report
        if: always()
        run: |
          [ -f e2e.cov ] || { echo "no e2e.cov (live run produced no profile)"; exit 0; }
          total="$(awk '/^total:/ {print $3}' e2e_cov_func.txt 2>/dev/null)"
          {
            echo "## Live coverage"
            echo ""
            echo "**Total: ${total:-n/a}** — live e2e suite (TestE2E + TestLive), -coverpkg over the library (reported, not gated; V132)"
            echo ""
            echo "| package | coverage |"
            echo "| --- | --- |"
            awk 'NR>1 {p=$1; sub(/:.*/,"",p); n=split(p,seg,"/"); pkg=seg[1]; for(i=2;i<n;i++) pkg=pkg"/"seg[i]; t[pkg]+=$2; if($3>0) c[pkg]+=$2}
                 END {for (k in t) printf "| `%s` | %.1f%% |\n", k, 100*c[k]/t[k]}' e2e.cov | sort
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Live coverage::total ${total:-n/a}"
      - name: Upload live coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-live
          path: e2e.cov
          if-no-files-found: warn
      - name: Teardown
        if: always()
        run: docker compose -f e2e/docker-compose.yml down
